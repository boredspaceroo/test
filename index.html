<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sophisticated Neon Spacecraft</title>
    <!-- Include the p5.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: black;
      }
    </style>
  </head>
  <body>
    <script>
      let tiltAngle = 0;
      let targetTilt = 0;
      let tesseracts = [];

      function setup() {
        createCanvas(windowWidth, windowHeight);
        strokeJoin(ROUND);
      }

      function draw() {
        background(0);
        tiltAngle = lerp(tiltAngle, targetTilt, 0.1);

        // Spawn tesseracts to simulate neon afterburner exhaust.
        if (frameCount % 20 === 0) {
          let sx = width / 2;
          let sy = height / 2 + 60;
          tesseracts.push(new Tesseract(sx, sy));
        }
        for (let i = tesseracts.length - 1; i >= 0; i--) {
          tesseracts[i].update();
          tesseracts[i].display();
          if (tesseracts[i].isOffScreen()) {
            tesseracts.splice(i, 1);
          }
        }

        // Draw the spacecraft in the center, applying the tilt.
        push();
        translate(width / 2, height / 2);
        rotate(tiltAngle);
        drawSpacecraft();
        pop();
      }

      // Draw a detailed wireframe spacecraft with multiple neon-coloured components.
      function drawSpacecraft() {
        // Use no fill, and set a stroke weight for the neon look.
        noFill();
        strokeWeight(2);

        //--- Fuselage and Cockpit ---
        // Draw the main body (fuselage) with a central neon blue line.
        stroke(0, 200, 255);
        beginShape();
        vertex(0, -40);   // nose tip
        vertex(10, -10);  // slight right curve
        vertex(15, 20);   // right engine mount
        vertex(10, 40);   // lower right body
        vertex(0, 45);    // bottom center (engine exit)
        vertex(-10, 40);  // lower left body
        vertex(-15, 20);  // left engine mount
        vertex(-10, -10); // slight left curve
        endShape(CLOSE);

        // Cockpit detail: a small, accented cockpit window.
        stroke(255, 150, 0); // orange for cockpit outline
        beginShape();
        vertex(0, -40);
        vertex(5, -30);
        vertex(0, -25);
        vertex(-5, -30);
        endShape(CLOSE);

        //--- Wings ---
        // Right wing: neon green outline.
        stroke(0, 255, 0);
        beginShape();
        vertex(5, 0);
        vertex(40, 5);
        vertex(35, 10);
        vertex(5, 5);
        endShape();

        // Left wing: mirror the right wing in neon magenta.
        stroke(255, 0, 255);
        beginShape();
        vertex(-5, 0);
        vertex(-40, 5);
        vertex(-35, 10);
        vertex(-5, 5);
        endShape();

        //--- Engine Pods ---
        // Draw engine pods beneath the fuselage in contrasting colors.
        // Right engine pod.
        stroke(255, 255, 0); // yellow
        rect(10, 20, 8, 15);
        // Left engine pod.
        stroke(0, 255, 255); // cyan
        rect(-18, 20, 8, 15);

        //--- Internal Structure Lines ---
        // Adding internal details to simulate a complex structure.
        stroke(200, 200, 200);
        line(0, -40, 0, 45);  // central spine
        line(-10, -10, 10, -10); // top crossbar of fuselage
        line(-10, 20, 10, 20);   // mid crossbar near engine mounts
      }

      // Use mouseDragged to adjust tilt.
      function mouseDragged() {
        let dx = mouseX - pmouseX;
        targetTilt += dx * 0.005;
        targetTilt = constrain(targetTilt, -PI / 6, PI / 6);
      }

      // For touch devices, adjust tilt.
      function touchMoved() {
        if (touches.length > 0) {
          let dx = touches[0].x - pmouseX;
          targetTilt += dx * 0.005;
          targetTilt = constrain(targetTilt, -PI / 6, PI / 6);
        }
        return false;
      }

      // Tesseract class for neon afterburner exhaust.
      class Tesseract {
        constructor(x, y) {
          this.x = x + random(-10, 10);
          this.y = y + random(5, 15);
          this.size = random(10, 20);
          this.angle = random(TWO_PI);
          this.rotationSpeed = random(-0.05, 0.05);
          this.speed = random(1, 3);
          let neonColors = [
            color(0, 255, 255),
            color(255, 0, 255),
            color(255, 255, 0),
            color(0, 255, 0)
          ];
          this.col = random(neonColors);
        }

        update() {
          this.y += this.speed;
          this.angle += this.rotationSpeed;
        }

        display() {
          push();
          translate(this.x, this.y);
          rotate(this.angle);
          stroke(this.col);
          noFill();
          strokeWeight(1);
          let s = this.size;
          let half = s / 2;
          let vertices1 = [
            createVector(-half, -half),
            createVector(half, -half),
            createVector(half, half),
            createVector(-half, half)
          ];
          let offset = s / 3;
          let vertices2 = vertices1.map((v) => createVector(v.x + offset, v.y + offset));

          beginShape();
          for (let v of vertices1) {
            vertex(v.x, v.y);
          }
          endShape(CLOSE);

          beginShape();
          for (let v of vertices2) {
            vertex(v.x, v.y);
          }
          endShape(CLOSE);

          for (let i = 0; i < 4; i++) {
            line(vertices1[i].x, vertices1[i].y, vertices2[i].x, vertices2[i].y);
          }
          pop();
        }

        isOffScreen() {
          return this.y - this.size > height;
        }
      }

      function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
      }
    </script>
  </body>
</html>
